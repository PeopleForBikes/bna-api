name: Bug report
description: Report a bug or unexpected behavior.
labels:
  - kind/bug
type: Bug
body:
  - type: markdown
    attributes:
      value: Provide a short title for your problem.

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of the api are you using?
      placeholder: |
        - e.g. 1.0.0
        - Commit: e.g. 1234567 ($ git log -1 --pretty=format:"%h %s")

  - type: textarea
    id: current_behavior
    attributes:
      label: Current behavior
      description: What is happening right now?
      placeholder: Describe the unexpected behavior.
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: Describe the intended behavior.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Step one
        2. Step two
        3. Step three

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant version, and commit details.
      placeholder: |
        - Rust: e.g. rustc 1.96.1 (31fca3adb 2026-06-26) (Homebrew) ($ rustc --version)
        - Commit: e.g. 1234567 ($ git log -1 --pretty=format:"%h %s")
    validations:
      required: true
